<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>EduJump Player</title>

<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Nunito:wght@800&family=Open+Sans:wght@800&family=Roboto+Mono:wght@700&family=Comfortaa:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<style>
:root{
    --bg:#020617;
}

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
    font-family:'Nunito',sans-serif;
}

#stage{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:transparent;
}

canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    touch-action:none;
}

#q-overlay{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    width:min(90vw,500px);
    min-height:60px;
    z-index:50;

    display:none;
    align-items:center;
    justify-content:center;

    border-radius:12px;
    text-align:center;
    padding:10px;
    box-sizing:border-box;

    font-size:22px;
    font-weight:bold;

    pointer-events:none;
}

#plat-container{
    position:absolute;
    inset:0;
    z-index:25;
    pointer-events:none;
}

.plat-txt{
    position:absolute;
    transform:translate(-50%,-50%);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-weight:bold;
    font-size:18px;
    pointer-events:none;

    text-shadow:
    -2px -2px 0 #000,
     2px -2px 0 #000,
    -2px  2px 0 #000,
     2px  2px 0 #000;
}

#rabbit-gif{
    position:absolute;
    z-index:10;
    pointer-events:none;
    transform-origin:center bottom;
    display:none;
}

#win-ui{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:100;

    width:min(90vw,600px);

    padding:30px;
    border-radius:30px;

    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    text-align:center;
    box-sizing:border-box;

    backdrop-filter:blur(12px);
}

#win-rabbit-gif{
    max-width:240px;
    max-height:180px;
    object-fit:contain;
    display:none;
}

#retry-btn{
    padding:14px 24px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    margin-top:20px;
}

#vol-ui{
    position:absolute;
    top:15px;
    right:15px;
    z-index:110;

    background:rgba(15,23,42,.6);

    padding:8px 12px;
    border-radius:20px;

    display:flex;
    align-items:center;
    gap:8px;

    color:#fff;

    backdrop-filter:blur(5px);
}
</style>
</head>

<body>

<div id="stage">

    <div id="vol-ui">
        🔊
        <input
            type="range"
            min="0"
            max="1"
            step="0.1"
            value="0.5"
            oninput="setGlobalVolume(this.value)"
        >
    </div>

    <div id="q-overlay"></div>

    <canvas id="canvas" width="800" height="450"></canvas>

    <div id="plat-container"></div>

    <img id="rabbit-gif">

    <div id="win-ui">

        <img id="win-rabbit-gif">

        <h2 id="win-title">ПОБЕДА!</h2>

        <button id="retry-btn" onclick="initGame()">
            ЕЩЁ РАЗ
        </button>

    </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const dataParam = params.get("data");

if(!dataParam){
    document.body.innerHTML = `
        <div style="
            display:flex;
            justify-content:center;
            align-items:center;
            width:100vw;
            height:100vh;
            color:white;
            background:#020617;
            font-family:sans-serif;
        ">
            NO GAME DATA
        </div>
    `;
    throw new Error("NO DATA");
}

const cfg =
    JSON.parse(
        decodeURIComponent(
            escape(
                atob(
                    decodeURIComponent(dataParam)
                )
            )
        )
    );

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const rabbitImg = document.getElementById('rabbit-gif');
const winRabbitImg = document.getElementById('win-rabbit-gif');

const qOverlay = document.getElementById('q-overlay');
const platContainer = document.getElementById('plat-container');

const winUI = document.getElementById('win-ui');

const FINISH_MARKER = "__GAME_FINISHED__";

const game = {
    active:false,
    loopId:null,
    camY:0,
    won:false,
    particles:[],
    totalClimb:0,
    currentQ:"",
    parallaxSpeed:cfg.para || 1,
    feetOffset:cfg.off || 0,

    player:{
        x:400,
        y:300,
        vy:0,
        targetX:400,
        lastPlatY:400
    },

    platforms:[]
};

function resizeCanvas(){

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

window.addEventListener('resize',resizeCanvas);

resizeCanvas();

function setGlobalVolume(v){

    Object.values(cfg.audios || {}).forEach(a=>{
        a.volume=v;
    });
}

function renderMath(el){

    if(window.renderMathInElement){

        renderMathInElement(el,{
            delimiters:[
                {left:'$$',right:'$$',display:true},
                {left:'$',right:'$',display:false}
            ],
            throwOnError:false
        });
    }
}

function updateQ(text){

    qOverlay.innerHTML=text;

    renderMath(qOverlay);
}

function hexToRgba(hex, alpha){

    const r=parseInt(hex.slice(1,3),16);
    const g=parseInt(hex.slice(3,5),16);
    const b=parseInt(hex.slice(5,7),16);

    return `rgba(${r},${g},${b},${alpha})`;
}

function loadAudio(url){

    if(!url)return null;

    const a=new Audio(url);

    a.volume=.5;

    return a;
}

const defaultSounds = {

    "start_url":"https://raw.githubusercontent.com/VeRa422/sounds_-_effects/refs/heads/main/4.mp3",
    "ok_url":"https://raw.githubusercontent.com/VeRa422/sounds_-_effects/refs/heads/main/5.mp3",
    "err_url":"https://raw.githubusercontent.com/VeRa422/sounds_-_effects/refs/heads/main/7.mp3",
    "win_url":"https://raw.githubusercontent.com/VeRa422/sounds_-_effects/refs/heads/main/9.mp3"
};

function getRealUrl(url){

    return defaultSounds[url] || url;
}

cfg.audios = {

    start:loadAudio(getRealUrl(cfg.s_s)),
    ok:loadAudio(getRealUrl(cfg.s_o)),
    err:loadAudio(getRealUrl(cfg.s_e)),
    win:loadAudio(getRealUrl(cfg.s_w))
};

const bgImg = new Image();
bgImg.crossOrigin="anonymous";
bgImg.src=cfg.b || "";

const platImg = new Image();
platImg.crossOrigin="anonymous";
platImg.src=cfg.p || "";

rabbitImg.src=cfg.h || "";
winRabbitImg.src=cfg.hw || "";

rabbitImg.style.display='block';

if(cfg.hw){
    winRabbitImg.style.display='block';
}

function applyStyles(){

    const st = cfg.st;

    qOverlay.style.background=st.qBg;
    qOverlay.style.border=`3px solid ${st.qBd}`;
    qOverlay.style.color=st.qTxt;
    qOverlay.style.fontFamily=st.font;

    if(st.useGlow){

        qOverlay.style.boxShadow=
            `0 0 20px ${st.glow}`;
    }

    rabbitImg.style.width=st.hSize+'px';

    winUI.style.background=
        hexToRgba(st.winBg,.7);

    winUI.style.border=
        `2px solid ${st.winBd}`;

    const winTitle=document.getElementById('win-title');

    winTitle.style.color=st.winTxt;
    winTitle.style.fontFamily=st.font;
    winTitle.innerText=cfg.l.w_t;

    const retry=document.getElementById('retry-btn');

    retry.innerText=cfg.l.r;
    retry.style.background=st.btnBg;
    retry.style.color=st.btnTxt;
}

applyStyles();

function initGame(){

    if(game.loopId){

        cancelAnimationFrame(game.loopId);
    }

    game.active=true;
    game.camY=0;
    game.won=false;
    game.particles=[];

    winUI.style.display='none';

    qOverlay.style.display='flex';

    let levels=[...cfg.lv];

    if(cfg.shuf){

        for(let i=levels.length-1;i>0;i--){

            const j=Math.floor(Math.random()*(i+1));

            [levels[i],levels[j]]=[levels[j],levels[i]];
        }
    }

    game.platforms=[];

    game.platforms.push({

        x:400,
        y:400,

        w:cfg.st.pW*1.4,
        h:cfg.st.pH,

        isOk:true,

        txt:cfg.l.s,

        q:levels[0]?.q || ""
    });

    let cy=400;

    levels.forEach((level,i)=>{

        cy-=220;

        let isL=Math.random()>.5;

        game.platforms.push({

            x:230,
            y:cy,

            w:cfg.st.pW,
            h:cfg.st.pH,

            isOk:isL,

            txt:isL ? level.a : level.w,

            q:levels[i+1]?.q || FINISH_MARKER
        });

        game.platforms.push({

            x:570,
            y:cy,

            w:cfg.st.pW,
            h:cfg.st.pH,

            isOk:!isL,

            txt:!isL ? level.a : level.w,

            q:levels[i+1]?.q || FINISH_MARKER
        });
    });

    game.totalClimb=400-cy;

    platContainer.innerHTML='';

    game.platforms.forEach((pl,idx)=>{

        const div=document.createElement('div');

        div.className='plat-txt';

        div.id='plat-'+idx;

        div.style.width=pl.w+'px';

        div.style.color=cfg.st.ansTxt;

        div.style.fontFamily=cfg.st.font;

        div.innerHTML=pl.txt;

        platContainer.appendChild(div);
    });

    renderMath(platContainer);

    const hReal = cfg.st.hSize;

    game.player = {

        x:400,

        y:400-(cfg.st.pH/2)-(hReal/2)-game.feetOffset,

        vy:0,

        targetX:400,

        lastPlatY:400
    };

    game.currentQ=levels[0]?.q || "";

    updateQ(game.currentQ);

    if(cfg.audios.start){

        cfg.audios.start.currentTime=0;

        cfg.audios.start.play().catch(()=>{});
    }

    render();
}

function render(){

    if(!game.active)return;

    if(!game.won){

        const p=game.player;

        const hReal=cfg.st.hSize;

        if(p.vy!==0 || p.y < (p.lastPlatY-100)){

            p.vy += .8;

            p.y += p.vy;

            p.x += (p.targetX-p.x)*0.12;
        }

        game.platforms.forEach(pl=>{

            const b =
                p.y + hReal/2 + game.feetOffset;

            if(

                p.vy>0 &&

                Math.abs(p.x-pl.x) < (pl.w/2+20) &&

                b > pl.y-cfg.st.pH/2 &&

                b < pl.y+cfg.st.pH/2+p.vy
            ){

                if(pl.isOk){

                    p.lastPlatY=pl.y;

                    p.y=
                        pl.y-
                        cfg.st.pH/2-
                        hReal/2-
                        game.feetOffset;

                    p.vy=0;

                    p.x=pl.x;

                    p.targetX=pl.x;

                    if(pl.q===FINISH_MARKER){

                        triggerWin();

                    }else{

                        game.currentQ=pl.q;

                        updateQ(game.currentQ);
                    }

                }else{

                    p.vy=-8;

                    p.targetX=400;

                    if(cfg.audios.err){

                        cfg.audios.err.currentTime=0;

                        cfg.audios.err.play().catch(()=>{});
                    }
                }
            }
        });

        game.camY +=
            ((300-p.y)-game.camY)*0.1;

        if(p.y > 900-game.camY){

            initGame();
        }
    }

    draw();

    game.loopId=requestAnimationFrame(render);
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(bgImg.complete && bgImg.src){

        const scale =
            canvas.width / bgImg.width;

        const scaledH =
            bgImg.height * scale;

        const progress =
            Math.max(
                0,
                Math.min(
                    1,
                    game.camY/game.totalClimb
                )
            );

        const bgOffset =
            (scaledH-canvas.height) -
            (progress*(scaledH-canvas.height)*game.parallaxSpeed);

        ctx.drawImage(
            bgImg,
            0,
            -bgOffset,
            canvas.width,
            scaledH
        );
    }

    ctx.save();

    ctx.translate(0,game.camY);

    game.platforms.forEach((pl,idx)=>{

        if(platImg.complete && platImg.src){

            ctx.drawImage(
                platImg,
                pl.x-pl.w/2,
                pl.y-pl.h/2,
                pl.w,
                pl.h
            );
        }

        const txt=document.getElementById('plat-'+idx);

        if(txt){

            txt.style.left =
                (pl.x/800*canvas.width)+'px';

            txt.style.top =
                ((pl.y+game.camY)/450*canvas.height)+'px';
        }
    });

    rabbitImg.style.left =
        ((game.player.x/800)*canvas.width - cfg.st.hSize/2)+'px';

    rabbitImg.style.top =
        (((game.player.y+game.camY)/450)*canvas.height - cfg.st.hSize/2)+'px';

    ctx.restore();
}

function triggerWin(){

    game.won=true;

    if(cfg.audios.win){

        cfg.audios.win.currentTime=0;

        cfg.audios.win.play().catch(()=>{});
    }

    winUI.style.display='flex';
}

document.getElementById('stage')
.addEventListener('pointerdown',(e)=>{

    if(
        !game.active ||
        game.player.vy!==0 ||
        game.won
    )return;

    const rect=canvas.getBoundingClientRect();

    const mx =
        ((e.clientX-rect.left)/rect.width)*800;

    const my =
        ((e.clientY-rect.top)/rect.height)*450 - game.camY;

    game.platforms.forEach(pl=>{

        if(

            mx > pl.x-pl.w/2 &&
            mx < pl.x+pl.w/2 &&

            my > pl.y-pl.h/2 &&
            my < pl.y+pl.h/2 &&

            pl.y < game.player.y
        ){

            game.player.targetX=pl.x;

            game.player.vy=-20;
        }
    });
});

initGame();

</script>
</body>
</html>
